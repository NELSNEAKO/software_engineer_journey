<!doctype html>
<html>
  <head>
    <title>String Manipulation Challenge</title>
  </head>
  <body>
    <h1>String Manipulation</h1>
    <input type="text" id="inputString" placeholder="Enter a string" />
    <button id="capitalizeButton">Capitalize</button>
    <div id="outputString"></div>
    <script>
      function capitalizeFirstLetters(str) {
        if (!str) return;
        // Add your code here

        let texts = str.split(' ');
        let capitalFirstLetter = texts.map((text) => {
          let firstLetter = text.slice(1);
          const capital = text[0].toUpperCase().concat(firstLetter);
          return capital;
        });

        return capitalFirstLetter.join(', ');
      }

      document
        .getElementById('capitalizeButton')
        .addEventListener('click', function () {
          const inputString = document.getElementById('inputString').value;
          const outputString = capitalizeFirstLetters(inputString);
          document.getElementById('outputString').textContent = outputString;
        });
    </script>
  </body>
</html>
